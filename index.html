<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ball Tracker</title>
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    /* ── Light theme — Club Red ── */
    /* TO CHANGE COLOURS: edit --pine (header) and --turf (highlights) */
    :root {
      --pine:        #1a1a1a;
      --turf:        #e3000f;
      --turf-light:  #fff0f0;
      --turf-border: #e3000f;
      --hazard:      #7f1d1d;
      --bg:          #f8f7f4;
      --surface:     #ffffff;
      --ink:         #111827;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --border-light:#f3f4f6;
      --dd-hover:    #fff0f0;
      --radius:      14px;
    }
    [data-theme="dark"] {
      --pine:        #0d0d0d;
      --turf:        #ff4444;
      --turf-light:  #1a0a0a;
      --turf-border: #ff4444;
      --hazard:      #cc0000;
      --bg:          #111111;
      --surface:     #1c1c1c;
      --ink:         #f5f5f5;
      --muted:       #a0a0a0;
      --border:      #2e2e2e;
      --border-light:#222222;
      --dd-hover:    #1f1212;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100vh; min-height: -webkit-fill-available;
      width: 100%; overflow-x: hidden;
      transition: background 0.25s, color 0.25s;
    }
    .app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: var(--pine); color: #fff;
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; width: 100%;
      transition: background 0.25s;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
    .header-right { display: flex; align-items: center; gap: 4px; }
    .btn-icon {
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 20px; cursor: pointer; padding: 6px; line-height: 1;
      border-radius: 8px; transition: color 0.15s, background 0.15s;
    }
    .btn-icon:active { color: white; background: rgba(255,255,255,0.1); }

    main { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; width: 100%; flex: 1; }

    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px;
    }

    .in-play-card {
      padding: 14px 16px; border-radius: var(--radius);
      display: flex; align-items: center; gap: 14px;
      min-height: 76px; transition: all 0.2s ease; width: 100%;
    }
    .in-play-card.empty  { border: 2px dashed var(--border); background: transparent; }
    .in-play-card.filled { background: var(--surface); border: 2px solid var(--turf-border); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .ball-icon {
      width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
    }
    .ball-icon.empty  { border: 2px dashed var(--border); color: var(--border); font-size: 22px; }
    .ball-icon.filled { font-size: 36px; }
    .ball-brand  { font-size: 20px; font-weight: 800; line-height: 1.15; color: var(--ink); }
    .ball-model  { font-size: 15px; font-weight: 600; color: var(--turf); margin-top: 2px; }
    .empty-label { color: var(--muted); font-size: 15px; opacity: 0.6; }

    .search-wrap { position: relative; width: 100%; }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 17px; color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 14px 16px 14px 44px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 16px; background: var(--surface); color: var(--ink);
      outline: none; -webkit-appearance: none; transition: border-color 0.15s, background 0.25s;
    }
    .search-input:focus { border-color: var(--turf-border); }

    .dropdown {
      display: none; background: var(--surface); border-radius: var(--radius);
      margin-top: 4px; box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      border: 1px solid var(--border); max-height: 240px; overflow-y: auto; width: 100%;
    }
    .dropdown.open { display: block; }
    .dd-item {
      padding: 12px 16px; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border-light); transition: background 0.1s; color: var(--ink);
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:active { background: var(--dd-hover); }
    .dd-empty, .dd-loading { padding: 20px 16px; text-align: center; color: var(--muted); font-size: 15px; }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; -webkit-appearance: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-lost   { background: var(--hazard); color: #fff; }
    .btn-lost:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; color: var(--turf); border: 1.5px solid var(--turf-border); font-weight: 600; padding: 14px 16px; }
    .btn-pine   { background: var(--pine); color: #fff; }
    .btn-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .stats-bar { display: flex; gap: 10px; width: 100%; }
    .stat-card { flex: 1; background: var(--surface); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border); min-width: 0; transition: background 0.25s; }
    .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 800; color: var(--ink); line-height: 1.1; }
    .stat-value.loading { color: var(--border); font-size: 14px; font-weight: 400; }
    .stat-value small { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; animation: fadeIn 0.2s ease; }
    .overlay.open { display: block; }

    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      transform: translateY(100%);
      background: var(--surface); border-radius: 20px 20px 0 0; z-index: 101;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.25s;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 -6px 30px rgba(0,0,0,0.2);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .sheet-title { font-size: 17px; font-weight: 700; color: var(--ink); }
    .sheet-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 4px; }
    .sheet-body { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

    .restore-item {
      padding: 15px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; transition: background 0.1s;
    }
    .restore-item:last-child { border-bottom: none; }
    .restore-item:active { background: var(--dd-hover); }
    .restore-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .restore-time { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .restore-arrow { color: var(--turf); font-size: 20px; font-weight: 700; flex-shrink: 0; }
    .sheet-empty { padding: 40px 20px; text-align: center; color: var(--muted); }

    .stock-filters { display: flex; gap: 7px; padding: 12px 20px 0; flex-wrap: wrap; flex-shrink: 0; }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s;
      color: var(--ink); display: flex; align-items: center; gap: 4px;
    }
    .filter-chip.active { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }
    .filter-chip:active { transform: scale(0.95); }
    .stock-item { padding: 14px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 12px; }
    .stock-item:last-child { border-bottom: none; }
    .stock-emoji { font-size: 22px; flex-shrink: 0; }
    .stock-info { flex: 1; min-width: 0; }
    .stock-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .stock-colour { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .stock-count { background: var(--turf); color: #fff; font-size: 13px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
    .stock-count.low { background: var(--hazard); }

    .form-body { padding: 16px 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }

    .colour-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .colour-btn {
      border: 2.5px solid var(--border); border-radius: 12px;
      background: var(--surface); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 6px; gap: 4px; transition: all 0.15s; -webkit-appearance: none;
    }
    .colour-btn span.emoji { font-size: 24px; line-height: 1; }
    .colour-btn span.label { font-size: 11px; font-weight: 600; color: var(--muted); }
    .colour-btn.selected { border-color: var(--turf-border); background: var(--turf-light); }
    .colour-btn.selected span.label { color: var(--turf); }
    .colour-btn:active { transform: scale(0.95); }

    .brand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; max-height: 220px; overflow-y: auto; }
    .brand-btn {
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface); cursor: pointer; padding: 10px 6px;
      font-size: 13px; font-weight: 600; color: var(--ink); text-align: center;
      transition: all 0.15s; -webkit-appearance: none; line-height: 1.2;
    }
    .brand-btn.selected { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }
    .brand-btn:active { transform: scale(0.95); }

    .field-input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 16px; color: var(--ink); background: var(--surface);
      outline: none; -webkit-appearance: none; transition: border-color 0.15s, background 0.25s;
    }
    .field-input:focus { border-color: var(--turf-border); }
    .model-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .model-chip {
      padding: 5px 11px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s; color: var(--ink);
    }
    .model-chip:active, .model-chip.selected { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }

    .qty-row { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .qty-btn {
      background: var(--surface); border: none; color: var(--turf);
      font-size: 22px; font-weight: 700; width: 56px; height: 52px;
      cursor: pointer; transition: background 0.1s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:active { background: var(--turf-light); }
    .qty-val {
      flex: 1; text-align: center; font-size: 22px; font-weight: 800;
      color: var(--ink); border-left: 1.5px solid var(--border); border-right: 1.5px solid var(--border);
      height: 52px; display: flex; align-items: center; justify-content: center;
    }

    .btn-submit {
      width: 100%; padding: 16px; background: var(--pine); color: #fff;
      border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .toast {
      position: fixed; top: 60px; left: 50%;
      transform: translateX(-50%) translateY(-14px);
      padding: 11px 20px; border-radius: 24px;
      font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap;
      z-index: 200; opacity: 0; pointer-events: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok   { background: var(--pine); }
    .toast.lost { background: var(--hazard); }
    .toast.err  { background: #374151; }

    .spin {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.75s linear infinite; vertical-align: middle;
    }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <span style="font-size:18px">⛳</span>
      <h1>Ball Tracker</h1>
    </div>
    <div class="header-right">
      <span id="ball-count-badge" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px;letter-spacing:0.02em">–</span>
      <button class="btn-icon" id="btn-dark" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button class="btn-icon" onclick="loadBalls(); loadStats();" title="Refresh">↺</button>
    </div>
  </header>

  <main>
    <div>
      <div class="section-label">In Play</div>
      <div class="in-play-card empty" id="in-play-card">
        <div class="ball-icon empty">○</div>
        <span class="empty-label" id="in-play-label">No ball selected</span>
      </div>
    </div>

    <div>
      <div class="section-label">Select Ball</div>
      <div class="search-wrap" id="search-wrap">
        <span class="search-icon" id="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input"
          placeholder="Loading…" disabled
          autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="onSearch()" onfocus="openDd()">
      </div>
      <div class="dropdown" id="dropdown">
        <div class="dd-loading"><span class="spin" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--turf)"></span> Loading…</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-lost" id="btn-lost" disabled onclick="markAsLost()">⛳&nbsp; Mark as Lost</button>
      <div class="btn-grid">
        <button class="btn btn-outline" onclick="openRestore()">↩&nbsp; Restore</button>
        <button class="btn btn-pine"    onclick="openAddBall()">＋&nbsp; Add Ball</button>
      </div>
      <button class="btn btn-outline" onclick="openStock()">📦&nbsp; Current Ball Stock</button>
    </div>

    <div>
      <div class="section-label">Today's Round</div>
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Lost Today</div>
          <div class="stat-value loading" id="stat-today">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Lost At</div>
          <div class="stat-value loading" id="stat-last">–</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span>Stats</span>
        <button onclick="toggleStats()" id="btn-stats-toggle"
          style="background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;padding:0">
          Hide
        </button>
      </div>
      <div id="stats-section">
        <div class="stats-bar">
          <div class="stat-card">
            <div class="stat-label">Total Lost 😬</div>
            <div class="stat-value loading" id="stat-total-lost">–</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Most Owned</div>
            <div class="stat-value loading" id="stat-most-owned">–</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sheet" id="sheet-restore">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Restore a Ball</span>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body" id="body-restore"></div>
</div>

<div class="sheet" id="sheet-add">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Add a Ball</span>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="form-body">
      <div>
        <div class="field-label">Colour</div>
        <div class="colour-grid">
          <button class="colour-btn selected" data-colour="White" onclick="selectColour(this)"><span class="emoji">⚪</span><span class="label">White</span></button>
          <button class="colour-btn" data-colour="Yellow" onclick="selectColour(this)"><span class="emoji">🟡</span><span class="label">Yellow</span></button>
          <button class="colour-btn" data-colour="Orange" onclick="selectColour(this)"><span class="emoji">🟠</span><span class="label">Orange</span></button>
          <button class="colour-btn" data-colour="Red" onclick="selectColour(this)"><span class="emoji">🔴</span><span class="label">Red</span></button>
        </div>
      </div>
      <div>
        <div class="field-label">Brand</div>
        <div class="brand-grid">
          <button class="brand-btn" data-brand="Titleist"   onclick="selectBrand(this)">Titleist</button>
          <button class="brand-btn" data-brand="Callaway"   onclick="selectBrand(this)">Callaway</button>
          <button class="brand-btn" data-brand="TaylorMade" onclick="selectBrand(this)">TaylorMade</button>
          <button class="brand-btn" data-brand="Srixon"     onclick="selectBrand(this)">Srixon</button>
          <button class="brand-btn" data-brand="Wilson"     onclick="selectBrand(this)">Wilson</button>
          <button class="brand-btn" data-brand="Bridgestone" onclick="selectBrand(this)">Bridgestone</button>
          <button class="brand-btn" data-brand="Vice"       onclick="selectBrand(this)">Vice</button>
          <button class="brand-btn" data-brand="Volvik"     onclick="selectBrand(this)">Volvik</button>
          <button class="brand-btn" data-brand="Pinnacle"   onclick="selectBrand(this)">Pinnacle</button>
          <button class="brand-btn" data-brand="Top Flite"  onclick="selectBrand(this)">Top Flite</button>
          <button class="brand-btn" data-brand="Slazenger"  onclick="selectBrand(this)">Slazenger</button>
          <button class="brand-btn" data-brand="Dunlop"     onclick="selectBrand(this)">Dunlop</button>
          <button class="brand-btn" data-brand="Nike"       onclick="selectBrand(this)">Nike</button>
          <button class="brand-btn" data-brand="Kirkland"   onclick="selectBrand(this)">Kirkland</button>
          <button class="brand-btn" data-brand="Maxfli"     onclick="selectBrand(this)">Maxfli</button>
          <button class="brand-btn" data-brand="Noodle"     onclick="selectBrand(this)">Noodle</button>
          <button class="brand-btn" data-brand="Inesis"     onclick="selectBrand(this)">Inesis</button>
          <button class="brand-btn" data-brand="Other"      onclick="selectBrand(this)">Other…</button>
        </div>
        <input type="text" id="brand-other" class="field-input" placeholder="Enter brand name"
          autocomplete="off" autocorrect="off" spellcheck="false" style="display:none;margin-top:8px">
      </div>
      <div>
        <div class="field-label">Model</div>
        <input type="text" id="add-model" class="field-input" placeholder="e.g. Pro V1"
          autocomplete="off" autocorrect="off" spellcheck="false" oninput="onModelInput()">
        <div class="model-suggestions" id="model-suggestions"></div>
      </div>
      <div>
        <div class="field-label">Quantity</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qty-display">1</span>
          <button class="qty-btn" onclick="changeQty(1)">＋</button>
        </div>
      </div>
      <button class="btn-submit" id="btn-add-submit" onclick="submitAddBall()">＋&nbsp; Add to Stock</button>
    </div>
  </div>
</div>

<div class="sheet" id="sheet-stock">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Current Ball Stock</span>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="stock-filters" id="stock-filters" style="display:none"></div>
  <div class="sheet-body" id="body-stock"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG — your GAS deployment URL ──────────────────────────
  const API = "https://script.google.com/macros/s/AKfycby48G9HQrb1RsqMioWVBkdz8ygZyxUNUYUQj1BAqMBCN2CqQBk86Njb2TS0SqQdZzj8/exec";

  // ── API helpers ───────────────────────────────────────────────
  async function apiGet(action, params) {
    const url = new URL(API);
    url.searchParams.set("action", action);
    if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    return res.json();
  }

  async function apiPost(action, body) {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action, ...body }),
    });
    return res.json();
  }

  // ── State ─────────────────────────────────────────────────────
  let allBalls      = [];
  let filteredBalls = [];
  let selected      = null;
  let ddOpen        = false;
  let pending       = false;
  let toastTimer;
  let selectedColour = "White";
  let selectedBrand  = null;
  let addQty         = 1;
  let stockData      = [];
  let stockFilter    = null;

  // ── Dark mode ─────────────────────────────────────────────────
  (function() {
    const saved = localStorage.getItem("balltracker-theme");
    if (saved === "dark") applyTheme("dark");
  })();

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    const btn = document.getElementById("btn-dark");
    if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
    document.getElementById("theme-color-meta").content = theme === "dark" ? "#0d0d0d" : "#1a1a1a";
  }

  function toggleDark() {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem("balltracker-theme", next);
  }

  // ── Colour emoji ──────────────────────────────────────────────
  function ballEmoji(colour) {
    const c = (colour || "white").toLowerCase().trim();
    if (c === "yellow") return "🟡";
    if (c === "orange") return "🟠";
    if (c === "red")    return "🔴";
    if (c === "pink")   return "🩷";
    if (c === "blue")   return "🔵";
    if (c === "green")  return "🟢";
    if (c === "purple") return "🟣";
    if (c === "black")  return "⚫";
    return "⚪";
  }

  // ── Smart time label ──────────────────────────────────────────
  function smartTimeLabel(ts) {
    const d   = new Date(ts);
    const now = new Date();
    const isToday = d.getFullYear() === now.getFullYear() &&
                    d.getMonth()    === now.getMonth()    &&
                    d.getDate()     === now.getDate();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    if (isToday) return `${hh}:${mm}`;
    const dd = String(d.getDate()).padStart(2,"0");
    const mo = String(d.getMonth()+1).padStart(2,"0");
    return `${dd}/${mo} ${hh}:${mm}`;
  }

  // ── Boot ──────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    loadBalls();
    loadStats();
    if (!statsVisible) {
      document.getElementById("stats-section").style.display = "none";
      document.getElementById("btn-stats-toggle").textContent = "Show";
    }
  });

  document.addEventListener("click", e => {
    const wrap = document.getElementById("search-wrap");
    const dd   = document.getElementById("dropdown");
    if (!wrap.contains(e.target) && !dd.contains(e.target)) closeDd();
  });

  // ── Load balls ────────────────────────────────────────────────
  async function loadBalls() {
    const dd    = document.getElementById("dropdown");
    const input = document.getElementById("search-input");
    dd.innerHTML = '<div class="dd-loading"><span class="spin" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--turf)"></span> Loading…</div>';
    dd.classList.remove("open");
    input.disabled    = true;
    input.placeholder = "Loading…";
    document.getElementById("search-icon").textContent = "⏳";

    try {
      const balls = await apiGet("getUniqueBalls");
      allBalls = balls;
      input.disabled    = false;
      input.placeholder = `Search ${balls.length} ball${balls.length !== 1 ? "s" : ""}…`;
      document.getElementById("search-icon").textContent = "🔍";
      document.getElementById("ball-count-badge").textContent = `${balls.length} balls`;
      renderDd(balls);
      showToast(`${balls.length} balls ready`, "ok");
    } catch(err) {
      dd.innerHTML = `<div class="dd-empty">⚠️ Failed to load</div>`;
      showToast("Failed to load balls", "err");
      document.getElementById("search-icon").textContent = "🔍";
    }
  }

  // ── Search ────────────────────────────────────────────────────
  function onSearch() {
    const q = document.getElementById("search-input").value.toLowerCase();
    filteredBalls = allBalls.filter(b => (b.brand + " " + b.model).toLowerCase().includes(q));
    renderDd(filteredBalls);
    openDd();
  }

  function renderDd(balls) {
    filteredBalls = balls;
    const dd = document.getElementById("dropdown");
    if (!balls.length) { dd.innerHTML = '<div class="dd-empty">No balls found</div>'; return; }
    dd.innerHTML = balls.map((b, i) =>
      `<div class="dd-item" data-i="${i}">
        <span style="font-size:20px;line-height:1;flex-shrink:0">${ballEmoji(b.colour)}</span>
        <span><strong>${escHtml(b.brand)}</strong> ${escHtml(b.model)}${b.count > 1 ? ` <span style="color:var(--muted);font-size:13px;font-weight:400">×${b.count}</span>` : ""}</span>
      </div>`
    ).join("");
  }

  document.addEventListener("click", e => {
    const item = e.target.closest(".dd-item");
    if (item) { const i = parseInt(item.dataset.i); const b = filteredBalls[i]; if (b) selectBall(b); }
  });

  function openDd()  { document.getElementById("dropdown").classList.add("open"); ddOpen = true; }
  function closeDd() { document.getElementById("dropdown").classList.remove("open"); ddOpen = false; }

  // ── Select ball ───────────────────────────────────────────────
  function selectBall(ball) {
    selected = ball;
    closeDd();
    document.getElementById("search-input").value = "";
    renderDd(allBalls);
    document.getElementById("search-input").blur();
    const card  = document.getElementById("in-play-card");
    card.className = "in-play-card filled";
    const icon = card.querySelector(".ball-icon");
    icon.className   = "ball-icon filled";
    icon.textContent = ballEmoji(ball.colour);
    const label = document.getElementById("in-play-label");
    label.outerHTML = `<div id="in-play-label"><div class="ball-brand">${escHtml(ball.brand)}</div><div class="ball-model">${escHtml(ball.model)}</div></div>`;
    document.getElementById("btn-lost").disabled = false;
  }

  function clearSelection() {
    selected = null;
    const card = document.getElementById("in-play-card");
    card.className = "in-play-card empty";
    const icon = card.querySelector(".ball-icon");
    icon.className = "ball-icon empty"; icon.textContent = "○";
    const lbl = document.getElementById("in-play-label");
    if (lbl) lbl.outerHTML = `<span class="empty-label" id="in-play-label">No ball selected</span>`;
    document.getElementById("btn-lost").disabled = true;
  }

  // ── Mark as Lost ──────────────────────────────────────────────
  async function markAsLost() {
    if (!selected || pending) return;
    pending = true;
    const { brand, model, colour } = selected;
    const btn = document.getElementById("btn-lost");
    btn.innerHTML = '<span class="spin"></span> Saving…';
    btn.disabled  = true;
    clearSelection();

    try {
      const res = await apiPost("markAsLost", { brand, model, colour });
      showToast(res.success ? `${brand} ${model} — lost ⛳` : (res.message || "Something went wrong"), res.success ? "lost" : "err");
    } catch(e) {
      showToast("Failed to save — try again", "err");
    }
    pending = false;
    btn.innerHTML = "⛳&nbsp; Mark as Lost";
    loadBalls(); loadStats();
  }

  // ── Sheet helpers ─────────────────────────────────────────────
  function openSheet(id) {
    document.getElementById("overlay").classList.add("open");
    document.getElementById(id).classList.add("open");
  }
  function closeAll() {
    document.getElementById("overlay").classList.remove("open");
    ["sheet-restore","sheet-add","sheet-stock"].forEach(id => document.getElementById(id).classList.remove("open"));
  }

  // ── Restore ───────────────────────────────────────────────────
  async function openRestore() {
    const body = document.getElementById("body-restore");
    body.innerHTML = '<div class="dd-loading"><span class="spin" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--turf)"></span> Loading…</div>';
    openSheet("sheet-restore");
    try {
      const balls = await apiGet("getRecentLost", { n: 10 });
      if (!balls.length) { body.innerHTML = '<div class="sheet-empty">No recently lost balls</div>'; return; }
      body.innerHTML = balls.map(b =>
        `<div class="restore-item" data-row="${b.rowIndex}" data-brand="${escAttr(b.brand)}" data-model="${escAttr(b.model)}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">${ballEmoji(b.colour)}</span>
            <div>
              <div class="restore-name">${escHtml(b.brand)} ${escHtml(b.model)}</div>
              <div class="restore-time">Lost ${escHtml(b.timeLabel)}</div>
            </div>
          </div>
          <span class="restore-arrow">↩</span>
        </div>`
      ).join("");
    } catch(e) {
      body.innerHTML = '<div class="sheet-empty">⚠️ Failed to load</div>';
    }
  }

  document.addEventListener("click", e => {
    const item = e.target.closest(".restore-item");
    if (item) restoreBall(parseInt(item.dataset.row), item.dataset.brand, item.dataset.model);
  });

  async function restoreBall(rowIndex, brand, model) {
    closeAll();
    try {
      await apiPost("restoreBall", { rowIndex });
      showToast(`${brand} ${model} restored ✓`, "ok");
    } catch(e) {
      showToast("Restore failed — try again", "err");
    }
    loadBalls(); loadStats();
  }

  // ── Add Ball ──────────────────────────────────────────────────
  function selectColour(btn) {
    document.querySelectorAll(".colour-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedColour = btn.dataset.colour;
  }

  function selectBrand(btn) {
    document.querySelectorAll(".brand-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedBrand = btn.dataset.brand;
    const other = document.getElementById("brand-other");
    if (selectedBrand === "Other") { other.style.display = "block"; other.focus(); }
    else { other.style.display = "none"; other.value = ""; updateModelSuggestions(selectedBrand); }
  }

  const knownModels = {
    "Titleist":    ["Pro V1","Pro V1x","AVX","Tour Speed","Velocity","TruFeel"],
    "Callaway":    ["Chrome Soft","Chrome Tour","Supersoft","ERC Soft","Warbird"],
    "TaylorMade":  ["TP5","TP5x","Tour Response","Soft Response","Distance+"],
    "Srixon":      ["Z-Star","Z-Star XV","Q-Star","Soft Feel","AD333"],
    "Bridgestone": ["TOUR B X","TOUR B XS","TOUR B RX","e12 Contact","e6"],
    "Wilson":      ["Staff Model","Duo Soft","Duo Optix","Ultra 500"],
    "Vice":        ["Pro","Pro Soft","Drive","Tour"],
    "Volvik":      ["Vivid","Power Soft","XTREM"],
    "Pinnacle":    ["Rush","Gold","Soft"],
    "Nike":        ["RZN Black","RZN Platinum","Mojo","One Platinum"],
    "Maxfli":      ["Tour","Tour X","Softfli","U/6"],
    "Kirkland":    ["Signature"],
  };

  function updateModelSuggestions(brand) {
    const s = document.getElementById("model-suggestions");
    const models = knownModels[brand] || [];
    s.innerHTML = models.map(m => `<button class="model-chip" onclick="pickModel('${escAttr(m)}')">${escHtml(m)}</button>`).join("");
  }

  function onModelInput() { document.querySelectorAll(".model-chip").forEach(c => c.classList.remove("selected")); }

  function pickModel(model) {
    document.getElementById("add-model").value = model;
    document.querySelectorAll(".model-chip").forEach(c => c.classList.toggle("selected", c.textContent === model));
  }

  function changeQty(delta) {
    addQty = Math.max(1, Math.min(36, addQty + delta));
    document.getElementById("qty-display").textContent = addQty;
  }

  function openAddBall() {
    selectedColour = "White"; selectedBrand = null; addQty = 1;
    document.querySelectorAll(".colour-btn").forEach(b => b.classList.remove("selected"));
    document.querySelector('.colour-btn[data-colour="White"]').classList.add("selected");
    document.querySelectorAll(".brand-btn").forEach(b => b.classList.remove("selected"));
    document.getElementById("brand-other").style.display = "none";
    document.getElementById("brand-other").value = "";
    document.getElementById("add-model").value   = "";
    document.getElementById("model-suggestions").innerHTML = "";
    document.getElementById("qty-display").textContent    = "1";
    document.getElementById("btn-add-submit").disabled  = false;
    document.getElementById("btn-add-submit").innerHTML = "＋&nbsp; Add to Stock";
    openSheet("sheet-add");
  }

  async function submitAddBall() {
    let brand = selectedBrand;
    if (brand === "Other") brand = document.getElementById("brand-other").value.trim();
    const model  = document.getElementById("add-model").value.trim();
    const colour = selectedColour;
    const qty    = addQty;
    if (!brand) { showToast("Please select a brand", "err"); return; }
    if (!model)  { showToast("Please enter a model", "err"); return; }

    const btn = document.getElementById("btn-add-submit");
    btn.innerHTML = '<span class="spin"></span> Saving…';
    btn.disabled  = true;

    try {
      for (let i = 0; i < qty; i++) {
        await apiPost("addBall", { brand, model, colour });
      }
      closeAll();
      showToast(`${ballEmoji(colour)} ${brand} ${model} ×${qty} added ✓`, "ok");
      loadBalls();
    } catch(e) {
      btn.innerHTML = "＋&nbsp; Add to Stock";
      btn.disabled  = false;
      showToast("Failed to add ball — try again", "err");
    }
  }

  // ── Stock ─────────────────────────────────────────────────────
  async function openStock() {
    stockFilter = null;
    const body    = document.getElementById("body-stock");
    const filters = document.getElementById("stock-filters");
    body.innerHTML    = '<div class="dd-loading"><span class="spin" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--turf)"></span> Loading…</div>';
    filters.style.display = "none"; filters.innerHTML = "";
    openSheet("sheet-stock");

    try {
      const balls = await apiGet("getUniqueBalls");
      balls.sort((a, b) => b.count - a.count || `${a.brand} ${a.model}`.localeCompare(`${b.brand} ${b.model}`));
      stockData = balls;

      const colours = [...new Set(balls.map(b => b.colour || "White"))];
      if (colours.length > 1) {
        filters.innerHTML =
          `<button class="filter-chip active" data-colour="all" onclick="setStockFilter(this,'all')">All</button>` +
          colours.map(c => `<button class="filter-chip" data-colour="${escAttr(c)}" onclick="setStockFilter(this,'${escAttr(c)}')">${ballEmoji(c)} ${escHtml(c)}</button>`).join("");
        filters.style.display = "flex";
      }
      renderStock(balls);
    } catch(e) {
      body.innerHTML = '<div class="sheet-empty">⚠️ Failed to load</div>';
    }
  }

  function setStockFilter(btn, colour) {
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    stockFilter = colour === "all" ? null : colour;
    renderStock(stockFilter ? stockData.filter(b => (b.colour || "White") === stockFilter) : stockData);
  }

  function renderStock(balls) {
    const body = document.getElementById("body-stock");
    if (!balls.length) { body.innerHTML = '<div class="sheet-empty">No balls in stock</div>'; return; }
    body.innerHTML = balls.map(b =>
      `<div class="stock-item">
        <span class="stock-emoji">${ballEmoji(b.colour)}</span>
        <div class="stock-info">
          <div class="stock-name">${escHtml(b.brand)} ${escHtml(b.model)}</div>
          <div class="stock-colour">${escHtml(b.colour || "White")}</div>
        </div>
        <span class="stock-count ${b.count === 1 ? "low" : ""}">${b.count}</span>
      </div>`
    ).join("");
  }

  // ── Stats ─────────────────────────────────────────────────────
  let statsVisible = localStorage.getItem("balltracker-stats") !== "hidden";

  function toggleStats() {
    statsVisible = !statsVisible;
    localStorage.setItem("balltracker-stats", statsVisible ? "visible" : "hidden");
    document.getElementById("stats-section").style.display = statsVisible ? "" : "none";
    document.getElementById("btn-stats-toggle").textContent = statsVisible ? "Hide" : "Show";
  }

  async function loadStats() {
    document.getElementById("stat-today").className   = "stat-value loading";
    document.getElementById("stat-today").textContent = "–";
    document.getElementById("stat-last").className    = "stat-value loading";
    document.getElementById("stat-last").textContent  = "–";
    document.getElementById("stat-total-lost").className   = "stat-value loading";
    document.getElementById("stat-total-lost").textContent = "–";
    document.getElementById("stat-most-owned").className   = "stat-value loading";
    document.getElementById("stat-most-owned").textContent = "–";

    try {
      const s = await apiGet("getStats");

      const todayEl = document.getElementById("stat-today");
      todayEl.className   = "stat-value";
      todayEl.textContent = s.lostToday;

      const lastEl = document.getElementById("stat-last");
      lastEl.className = "stat-value";
      if (s.lastLost) {
        lastEl.innerHTML = `${smartTimeLabel(s.lastLost.ts)}<small>${ballEmoji(s.lastLost.colour)} ${escHtml(s.lastLost.brand)} ${escHtml(s.lastLost.model)}</small>`;
      } else {
        lastEl.textContent = "None yet";
      }

      const totalEl = document.getElementById("stat-total-lost");
      totalEl.className   = "stat-value";
      totalEl.textContent = s.totalLost;

      const mostEl = document.getElementById("stat-most-owned");
      mostEl.className = "stat-value";
      if (s.mostOwned) {
        mostEl.innerHTML = `${s.mostOwned.count}<small>${escHtml(s.mostOwned.brand)} ${escHtml(s.mostOwned.model)}</small>`;
      } else {
        mostEl.textContent = "None yet";
      }
    } catch(e) {
      document.getElementById("stat-today").textContent      = "–";
      document.getElementById("stat-last").textContent       = "–";
      document.getElementById("stat-total-lost").textContent = "–";
      document.getElementById("stat-most-owned").textContent = "–";
    }
  }

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg, type) {
    clearTimeout(toastTimer);
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    toastTimer    = setTimeout(() => t.classList.remove("show"), 3000);
  }

  // ── Utils ─────────────────────────────────────────────────────
  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function escAttr(s) { return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
</script>
</body>
</html>
