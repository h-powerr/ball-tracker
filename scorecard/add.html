<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Add Round — Ball Tracker</title>
  <link rel="apple-touch-icon" href="../icon.png">
  <style>
    :root {
      --pine:        #111111;
      --turf:        #e3000f;
      --turf-light:  #fff0f0;
      --turf-border: #e3000f;
      --hazard:      #7f1d1d;
      --bg:          #f8f7f4;
      --surface:     #ffffff;
      --ink:         #111827;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --border-light:#f3f4f6;
      --radius:      14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink); min-height: 100%;
    }
    .app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: var(--pine); color: #fff;
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .hdr-title { font-size: 16px; font-weight: 700; text-align: center; }
    .hdr-close {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff;
      width: 34px; height: 34px; border-radius: 10px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .hdr-spacer { width: 34px; }

    main {
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 28px);
      display: flex; flex-direction: column; gap: 16px;
      max-width: 560px; width: 100%; margin: 0 auto; flex: 1;
    }

    .step-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 2px; }
    .step-dot { width: 8px; height: 8px; border-radius: 4px; background: var(--border); transition: all 0.2s; }
    .step-dot.active { background: var(--turf); width: 22px; }
    .step-dot.done { background: var(--pine); }

    .section-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px;
    }
    .field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
    .field-input {
      width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 16px; color: var(--ink); background: var(--surface);
      outline: none; -webkit-appearance: none; transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--turf-border); }

    .step-panel { display: none; flex-direction: column; gap: 20px; }
    .step-panel.active { display: flex; }

    /* Location chips */
    .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .loc-btn {
      border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface);
      cursor: pointer; padding: 12px 6px; font-size: 13px; font-weight: 700;
      color: var(--ink); text-align: center; transition: all 0.15s; -webkit-appearance: none;
    }
    .loc-btn.selected { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }
    .loc-btn:active { transform: scale(0.96); }
    .loc-other-btn { width: 100%; margin-top: 8px; }

    /* Format toggle */
    .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .format-btn {
      padding: 18px 10px; border-radius: var(--radius); border: 2px solid var(--border);
      background: var(--surface); text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .format-btn.selected { border-color: var(--turf-border); background: var(--turf-light); }
    .format-btn .fn { font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1; }
    .format-btn.selected .fn { color: var(--turf); }
    .format-btn .fl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; -webkit-appearance: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
    .btn-pine { background: var(--pine); color: #fff; }
    .btn-outline { background: transparent; color: var(--turf); border: 1.5px solid var(--turf-border); font-weight: 600; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); font-weight: 600; }

    /* Par setup */
    .par-hint { font-size: 13px; color: var(--muted); line-height: 1.5; background: var(--border-light); border-radius: var(--radius); padding: 12px 14px; }
    .par-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .par-cell { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 8px 6px; text-align: center; }
    .par-cell .ph { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .par-cell .pv { font-size: 20px; font-weight: 800; color: var(--ink); margin: 4px 0; }
    .par-cell .prow { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .par-mini-btn { width: 26px; height: 26px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; }

    /* Hole score cards */
    .hole-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; display: flex; flex-direction: column; gap: 10px;
    }
    .hole-card-head { display: flex; align-items: center; justify-content: space-between; }
    .hole-card-title { font-size: 14px; font-weight: 800; color: var(--ink); }
    .hole-card-par { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--border-light); padding: 2px 8px; border-radius: 10px; }
    /* Tap grids — single tap sets the value, nothing pre-selected */
    .tap-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .tap-btn {
      padding: 10px 2px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface);
      font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; text-align: center;
      -webkit-appearance: none; transition: all 0.12s;
    }
    .tap-btn.selected { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }
    .tap-btn:active { transform: scale(0.94); }
    .tap-grid-score { margin: 2px 0 4px; }
    .tap-grid-score .tap-btn { padding: 13px 2px; font-size: 17px; font-weight: 800; }

    .detail-toggle {
      font-size: 12px; font-weight: 700; color: var(--turf); background: none; border: none;
      cursor: pointer; text-align: left; padding: 2px 0; display: flex; align-items: center; gap: 4px;
    }
    .detail-body { display: none; flex-direction: column; gap: 12px; padding-top: 10px; border-top: 1px dashed var(--border); }
    .detail-body.open { display: flex; }
    .mini-row { display: flex; flex-direction: column; gap: 6px; }
    .mini-row .lbl { font-size: 13px; color: var(--muted); font-weight: 600; }
    .chip-row { display: flex; gap: 6px; }
    .chip-opt {
      flex: 1; padding: 8px 6px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 12px;
      font-weight: 700; color: var(--muted); background: var(--surface); cursor: pointer; text-align: center;
      -webkit-appearance: none; transition: all 0.12s;
    }
    .chip-opt.selected { border-color: var(--turf-border); background: var(--turf-light); color: var(--turf); }

    .progress-hint { text-align: center; font-size: 12.5px; color: var(--muted); font-weight: 600; }
    .progress-hint.complete { color: var(--turf); }

    /* Success screen */
    .success-wrap { text-align: center; padding: 24px 8px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .success-icon {
      width: 68px; height: 68px; border-radius: 50%; background: var(--turf-light); color: var(--turf);
      font-size: 32px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
    }
    .success-title { font-size: 19px; font-weight: 800; color: var(--ink); }
    .success-sub { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .success-total {
      margin-top: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; width: 100%; text-align: center;
    }
    .success-total .tv { font-size: 30px; font-weight: 800; color: var(--turf); }
    .success-total .tl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
    .success-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 20px; }

    .err-banner {
      background: #fff0f0; border: 1px solid var(--hazard); color: var(--hazard); border-radius: var(--radius);
      padding: 10px 14px; font-size: 13px; font-weight: 600; display: none;
    }
    .err-banner.show { display: block; }

    .spin {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.75s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="hdr-spacer"></div>
    <div class="hdr-title" id="hdr-title">Add Round</div>
    <button class="hdr-close" onclick="location.href='../index.html?open=roundstats'" title="Close">✕</button>
  </header>

  <main>
    <div class="step-dots" id="step-dots"></div>

    <!-- STEP 1: Round info -->
    <div class="step-panel active" id="panel-1">
      <div>
        <div class="section-label">Location</div>
        <div class="chip-grid" id="loc-grid">
          <button class="loc-btn selected" data-loc="Drax Golf Club" onclick="selectLocation(this)">Drax</button>
          <button class="loc-btn" data-loc="Cannock Park" onclick="selectLocation(this)">Cannock Park</button>
          <button class="loc-btn" data-loc="Keswick" onclick="selectLocation(this)">Keswick</button>
        </div>
        <button class="loc-btn loc-other-btn" data-loc="Other" onclick="selectLocation(this)">Other…</button>
        <input type="text" id="loc-other-input" class="field-input" placeholder="Enter course name"
          autocomplete="off" autocorrect="off" spellcheck="false" style="display:none;margin-top:8px">
      </div>

      <div>
        <div class="section-label">Format</div>
        <div class="format-grid">
          <button class="format-btn" data-format="9" onclick="selectFormat(this)">
            <div class="fn">9</div><div class="fl">Holes</div>
          </button>
          <button class="format-btn selected" data-format="18" onclick="selectFormat(this)">
            <div class="fn">18</div><div class="fl">Holes</div>
          </button>
        </div>
      </div>

      <div>
        <div class="section-label">Date</div>
        <input type="date" id="round-date" class="field-input">
      </div>

      <button class="btn btn-pine" onclick="goToStep1point5()">Continue</button>
    </div>

    <!-- STEP 1.5: Course par setup (only shown for courses with no known par data) -->
    <div class="step-panel" id="panel-15">
      <div>
        <div class="section-label" id="par-setup-label">Set Up This Course</div>
        <div class="par-hint">
          No par data yet for this course. Add it now to unlock trend lines and par tracking on the Round Stats page — or skip and add it later.
        </div>
      </div>
      <div class="par-grid" id="par-grid"></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-pine" onclick="submitParSetup()" id="par-continue-btn">Save Par &amp; Continue</button>
        <button class="btn btn-ghost" onclick="skipParSetup()">Skip for now</button>
      </div>
    </div>

    <!-- STEP 2: Per-hole scores -->
    <div class="step-panel" id="panel-2">
      <div class="err-banner" id="err-banner"></div>
      <div id="hole-cards" style="display:flex;flex-direction:column;gap:10px"></div>
      <div class="progress-hint" id="save-progress">0 of 9 holes scored</div>
      <button class="btn btn-pine" id="save-round-btn" onclick="submitRound()" disabled>Save Round</button>
    </div>

    <!-- STEP 3: Confirmation -->
    <div class="step-panel" id="panel-3">
      <div class="success-wrap">
        <div class="success-icon">✓</div>
        <div class="success-title">Round Saved</div>
        <div class="success-sub" id="success-sub"></div>
        <div class="success-total">
          <div class="tv" id="success-total-val">–</div>
          <div class="tl">Gross Score</div>
        </div>
        <div class="success-actions">
          <button class="btn btn-pine" onclick="resetForm()">＋ Add Another Round</button>
          <button class="btn btn-outline" onclick="location.href='../index.html?open=roundstats'">📊 View Round Stats</button>
          <button class="btn btn-ghost" onclick="location.href='../index.html'">Back to Ball Tracker</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────
  const API = "https://script.google.com/macros/s/AKfycbxmQvGApPfL2yxpcd3OMJRogzwmZ0PBxuTIhD3tFzqUZUXlpPcO7oKavoi1jkGuOGTQ/exec";

  // ── API helpers ───────────────────────────────────────────────
  async function apiGet(action, params) {
    const url = new URL(API);
    url.searchParams.set("action", action);
    if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { throw new Error("bad-response"); }
  }
  async function apiPost(action, body) {
    const res = await fetch(API, { method:"POST", body: JSON.stringify({ action, ...body }) });
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { throw new Error("bad-response"); }
  }

  // ── State ─────────────────────────────────────────────────────
  let currentStep   = 1;   // 1, 1.5 (shown as 'par'), 2, 3
  let location_     = "Drax Golf Club";
  let format_       = 18;
  let holes         = [];  // [{hole, score, putts, penalties, fairwayHit, gir}]
  let courseParMap  = {};  // { courseName: { hole: par } }
  let parInputs     = {};  // hole -> par value during setup
  let needsParSetup = false;
  let lastSavedTotal = 0;

  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // ── Boot ──────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    const d = new Date();
    document.getElementById("round-date").value = d.toISOString().slice(0,10);
    loadCourseParMap();
  });

  async function loadCourseParMap() {
    try {
      const rows = await apiGet("courseParData");
      const map = {};
      (rows || []).forEach(r => {
        if (!r.course || !r.hole || !r.par) return;
        map[r.course] = map[r.course] || {};
        map[r.course][r.hole] = r.par;
      });
      courseParMap = map;
    } catch(e) { courseParMap = {}; }
  }

  // ── Step 1: location / format ────────────────────────────────
  function selectLocation(btn) {
    document.querySelectorAll(".loc-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    const otherInput = document.getElementById("loc-other-input");
    if (btn.dataset.loc === "Other") {
      otherInput.style.display = "block";
      otherInput.focus();
      location_ = otherInput.value.trim();
      otherInput.oninput = () => { location_ = otherInput.value.trim(); };
    } else {
      otherInput.style.display = "none";
      location_ = btn.dataset.loc;
    }
  }
  function selectFormat(btn) {
    document.querySelectorAll(".format-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    format_ = Number(btn.dataset.format);
  }

  function updateStepDots(activeIdx, total) {
    const wrap = document.getElementById("step-dots");
    wrap.innerHTML = "";
    for (let i = 0; i < total; i++) {
      const dot = document.createElement("div");
      dot.className = "step-dot" + (i === activeIdx ? " active" : i < activeIdx ? " done" : "");
      wrap.appendChild(dot);
    }
  }
  function showPanel(id) {
    document.querySelectorAll(".step-panel").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── Step 1 -> 1.5 or 2 ────────────────────────────────────────
  function goToStep1point5() {
    if (!location_) { alert("Please enter a course name."); return; }
    const known = courseParMap[location_];
    const knownCount = known ? Object.keys(known).length : 0;
    needsParSetup = knownCount < format_;

    if (needsParSetup) {
      renderParSetup();
      updateStepDots(1, 4);
      showPanel("panel-15");
    } else {
      buildHoleCards();
      updateStepDots(2, 4);
      showPanel("panel-2");
    }
  }

  // ── Step 1.5: par setup ──────────────────────────────────────
  function renderParSetup() {
    document.getElementById("par-setup-label").textContent = `Set Up ${location_}`;
    parInputs = {};
    const known = courseParMap[location_] || {};
    const grid = document.getElementById("par-grid");
    let html = "";
    for (let h = 1; h <= format_; h++) {
      const val = known[h] || 4;
      parInputs[h] = known[h] || null;
      html += `
        <div class="par-cell">
          <div class="ph">Hole ${h}</div>
          <div class="pv" id="par-val-${h}">${known[h] ? known[h] : "–"}</div>
          <div class="prow">
            <button class="par-mini-btn" onclick="changePar(${h},-1)">−</button>
            <button class="par-mini-btn" onclick="changePar(${h},1)">＋</button>
          </div>
        </div>`;
    }
    grid.innerHTML = html;
  }
  function changePar(h, delta) {
    const cur = parInputs[h] || 4;
    const next = Math.min(6, Math.max(3, cur + delta));
    parInputs[h] = next;
    document.getElementById(`par-val-${h}`).textContent = next;
  }
  async function submitParSetup() {
    const pars = Object.entries(parInputs)
      .filter(([h,p]) => p)
      .map(([h,p]) => ({ hole: Number(h), par: Number(p) }));
    if (pars.length) {
      const btn = document.getElementById("par-continue-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span>';
      try {
        await apiPost("courseParData", { course: location_, pars });
        courseParMap[location_] = courseParMap[location_] || {};
        pars.forEach(p => courseParMap[location_][p.hole] = p.par);
      } catch(e) { /* non-fatal — proceed anyway */ }
      btn.disabled = false;
      btn.textContent = "Save Par & Continue";
    }
    buildHoleCards();
    updateStepDots(2, 4);
    showPanel("panel-2");
  }
  function skipParSetup() {
    buildHoleCards();
    updateStepDots(2, 4);
    showPanel("panel-2");
  }

  // ── Step 2: hole score cards ──────────────────────────────────
  function buildHoleCards() {
    holes = [];
    for (let h = 1; h <= format_; h++) {
      holes.push({ hole: h, score: null, putts: null, penalties: null, fairwayHit: null, gir: null });
    }
    renderHoleCards();
  }
  // Putts/Penalties share a 0-3 + "≥4" tap grid (stored as 4 for the catch-all).
  const SMALL_GRID_OPTIONS = [0, 1, 2, 3, 4];
  function smallGridHtml(i, prefix, selected) {
    return SMALL_GRID_OPTIONS.map(n => {
      const label = n === 4 ? "≥4" : n;
      return `<div class="tap-btn ${selected === n ? "selected" : ""}" onclick="setCount(${i},'${prefix === "putts" ? "putts" : "penalties"}',${n})" id="${prefix}-${n}-${i}">${label}</div>`;
    }).join("");
  }
  const MAX_SCORE = 10;
  function scoreGridHtml(i, selected) {
    let html = "";
    for (let n = 1; n <= MAX_SCORE; n++) {
      html += `<div class="tap-btn ${selected === n ? "selected" : ""}" onclick="setScore(${i},${n})" id="score-${n}-${i}">${n}</div>`;
    }
    return html;
  }
  function renderHoleCards() {
    const wrap = document.getElementById("hole-cards");
    const parMap = courseParMap[location_] || {};
    wrap.innerHTML = holes.map((h, i) => {
      const par = parMap[h.hole];
      const isPar3 = par === 3;
      const detailLabel = isPar3 ? "putts, penalties, GIR" : "putts, penalties, fairway, GIR";
      return `
      <div class="hole-card">
        <div class="hole-card-head">
          <div class="hole-card-title">Hole ${h.hole}</div>
          ${par ? `<div class="hole-card-par">Par ${par}</div>` : ""}
        </div>
        <div class="tap-grid tap-grid-score">${scoreGridHtml(i, h.score)}</div>
        <button class="detail-toggle" onclick="toggleDetail(${i})">
          <span id="detail-caret-${i}">▸</span> Add detail (${detailLabel})
        </button>
        <div class="detail-body" id="detail-body-${i}">
          <div class="mini-row">
            <span class="lbl">Putts</span>
            <div class="tap-grid">${smallGridHtml(i, "putts", h.putts)}</div>
          </div>
          <div class="mini-row">
            <span class="lbl">Penalties</span>
            <div class="tap-grid">${smallGridHtml(i, "pen", h.penalties)}</div>
          </div>
          ${isPar3 ? "" : `
          <div class="mini-row">
            <span class="lbl">Fairway Hit</span>
            <div class="chip-row">
              <div class="chip-opt" onclick="setChip(${i},'fairwayHit','Y')" id="fw-Y-${i}">Y</div>
              <div class="chip-opt" onclick="setChip(${i},'fairwayHit','N')" id="fw-N-${i}">N</div>
              <div class="chip-opt" onclick="setChip(${i},'fairwayHit','NA')" id="fw-NA-${i}">N/A</div>
            </div>
          </div>`}
          <div class="mini-row">
            <span class="lbl">GIR</span>
            <div class="chip-row">
              <div class="chip-opt" onclick="setChip(${i},'gir','Y')" id="gir-Y-${i}">Y</div>
              <div class="chip-opt" onclick="setChip(${i},'gir','N')" id="gir-N-${i}">N</div>
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
    updateSaveProgress();
  }
  function setScore(i, val) {
    const h = holes[i];
    h.score = (h.score === val) ? null : val;
    for (let n = 1; n <= MAX_SCORE; n++) {
      const el = document.getElementById(`score-${n}-${i}`);
      if (el) el.classList.toggle("selected", h.score === n);
    }
    updateSaveProgress();
  }
  function setCount(i, field, val) {
    const h = holes[i];
    h[field] = (h[field] === val) ? null : val;
    const prefix = field === "putts" ? "putts" : "pen";
    SMALL_GRID_OPTIONS.forEach(n => {
      const el = document.getElementById(`${prefix}-${n}-${i}`);
      if (el) el.classList.toggle("selected", h[field] === n);
    });
  }
  function updateSaveProgress() {
    const total = holes.length;
    const done = holes.filter(h => h.score != null).length;
    const hint = document.getElementById("save-progress");
    const btn = document.getElementById("save-round-btn");
    if (hint) {
      hint.textContent = done === total ? `All ${total} holes scored` : `${done} of ${total} holes scored`;
      hint.classList.toggle("complete", done === total);
    }
    if (btn) btn.disabled = done < total;
  }
  function toggleDetail(i) {
    const body = document.getElementById(`detail-body-${i}`);
    const caret = document.getElementById(`detail-caret-${i}`);
    const open = body.classList.toggle("open");
    caret.textContent = open ? "▾" : "▸";
  }
  function setChip(i, field, val) {
    const h = holes[i];
    h[field] = (h[field] === val) ? null : val;
    const prefix = field === "fairwayHit" ? "fw" : "gir";
    const options = field === "fairwayHit" ? ["Y","N","NA"] : ["Y","N"];
    options.forEach(o => {
      document.getElementById(`${prefix}-${o}-${i}`).classList.toggle("selected", h[field] === o);
    });
  }

  // ── Step 2 -> 3: save ──────────────────────────────────────────
  async function submitRound() {
    const btn = document.getElementById("save-round-btn");
    const err = document.getElementById("err-banner");
    err.classList.remove("show");
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Saving…';

    const payloadHoles = holes.map(h => ({
      hole: h.hole,
      score: h.score,
      putts: h.putts,
      penalties: h.penalties,
      fairwayHit: h.fairwayHit,
      gir: h.gir,
    }));

    try {
      const res = await apiPost("rounds", {
        course: location_,
        format: format_,
        date: document.getElementById("round-date").value,
        holes: payloadHoles,
      });
      if (!res || res.success === false) throw new Error((res && res.message) || "Save failed");

      lastSavedTotal = holes.reduce((sum, h) => sum + h.score, 0);
      document.getElementById("success-total-val").textContent = lastSavedTotal;
      document.getElementById("success-sub").textContent =
        `${escHtml(location_)} · ${format_} holes · ${document.getElementById("round-date").value}`;
      updateStepDots(3, 4);
      showPanel("panel-3");
    } catch(e) {
      err.textContent = "Couldn't save round — check your connection and try again.";
      err.classList.add("show");
    } finally {
      btn.disabled = false;
      btn.textContent = "Save Round";
    }
  }

  // ── Reset for "Add Another" ─────────────────────────────────────
  function resetForm() {
    currentStep = 1;
    document.getElementById("round-date").value = new Date().toISOString().slice(0,10);
    updateStepDots(0, 4);
    showPanel("panel-1");
  }
</script>
</body>
</html>
